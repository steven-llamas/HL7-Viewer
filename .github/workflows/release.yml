name: Build Executables

on:
  push:
    branches:
      - main
#    tags:
#      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          cache: maven

      - name: Build shaded JAR and macOS DMG
        run: mvn clean package -Pmac

      - name: List target folder recursively
        run: ls -R target

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HL7-Viewer-mac
          path: target/*.dmg

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          cache: maven

      - name: Build shaded JAR and Windows MSI
        run: mvn clean package -Pwindows

      - name: List target folder recursively
        run: Get-ChildItem -Path target -Recurse
        
      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: HL7-Viewer-windows
          path: target\*.msi
